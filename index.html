<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Journal Portal</title>

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://journal.razinsaleh.shop">

<style>
:root {
    --bg: #E0E5EC;
    --text: #3D4852;
    --muted: #6B7280;

    --accent1: #6C63FF;
    --accent2: #38B2AC;

    --shadow-dark: rgb(163,177,198,0.6);
    --shadow-light: rgba(255,255,255,0.6);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    font-family: "DM Sans", sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

/* ===== Floating Gradient Orbs ===== */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.6;
    animation: float 8s ease-in-out infinite;
}

.orb.one {
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, var(--accent1), transparent 70%);
    top: 5%;
    left: 5%;
}

.orb.two {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--accent2), transparent 70%);
    bottom: 10%;
    right: 10%;
    animation-delay: 2s;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0px); }
}

/* ===== Hero Container ===== */
.hero {
    max-width: 650px;
    width: 100%;
    padding: 50px 40px;
    text-align: center;
    border-radius: 32px;
    background: var(--bg);

    box-shadow:
        12px 12px 24px var(--shadow-dark),
        -12px -12px 24px var(--shadow-light);

    position: relative;
    z-index: 2;
}

/* ===== Typography ===== */
.hero h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 700;
    line-height: 1.2;
}

.hero p {
    margin-top: 18px;
    font-size: clamp(14px, 2.5vw, 17px);
    color: var(--muted);
    line-height: 1.7;
}

/* Accent underline */
.line {
    width: 80px;
    height: 5px;
    margin: 22px auto;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
}

/* ===== Button ===== */
.btn {
    margin-top: 28px;
    padding: 14px 40px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    cursor: pointer;
    color: white;

    background: linear-gradient(135deg, var(--accent1), var(--accent2));

    box-shadow:
        6px 6px 14px var(--shadow-dark),
        -6px -6px 14px var(--shadow-light);

    transition: all 0.3s ease;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow:
        14px 14px 28px var(--shadow-dark),
        -14px -14px 28px var(--shadow-light);
}

.btn:active {
    transform: scale(0.97);
}

.btn:focus {
    outline: none;
    box-shadow:
        0 0 0 3px rgba(108,99,255,0.4);
}

/* ===== Responsive Adjustments ===== */
@media (max-width: 480px) {
    .hero {
        padding: 35px 20px;
    }

    .orb {
        display: none; /* cleaner on small screens */
    }
}
</style>
</head>

<body>

<div class="orb one"></div>
<div class="orb two"></div>

<div class="hero">
    <h1>The Journal of Abdul Muhit Razin</h1>

    <div class="line"></div>

    <p>
        A personal space where thoughts unfold into words —  
        reflections, ideas, and quiet expressions shaped with intention.
    </p>

    <button class="btn" onclick="window.open('https://journal.razinsaleh.shop/', '_blank')">
        Enter Journal
    </button>
</div>

</body>
</html>
