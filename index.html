<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Journal</title>

<!-- Performance -->
<link rel="preconnect" href="https://journal.razinsaleh.shop">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at 30% 30%, #111, #000);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
    }

    /* Subtle animated background glow */
    body::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
        filter: blur(80px);
        animation: float 6s ease-in-out infinite alternate;
    }

    @keyframes float {
        from { transform: translate(-50px, -30px); }
        to { transform: translate(50px, 30px); }
    }

    /* Glass container */
    .container {
        padding: 40px 60px;
        border-radius: 20px;
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        text-align: center;
    }

    /* Title */
    .title {
        color: #aaa;
        font-size: 14px;
        letter-spacing: 2px;
        margin-bottom: 20px;
        text-transform: uppercase;
    }

    /* Button */
    .btn {
        position: relative;
        padding: 14px 34px;
        font-size: 16px;
        color: #fff;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        overflow: hidden;
    }

    /* Glow effect */
    .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
        transform: translateX(-100%);
        transition: 0.6s;
    }

    .btn:hover::before {
        transform: translateX(100%);
    }

    .btn:hover {
        border-color: rgba(255,255,255,0.4);
        box-shadow: 0 0 20px rgba(255,255,255,0.15);
        transform: translateY(-2px);
    }

    .btn:active {
        transform: scale(0.97);
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">Private Journal Portal</div>
    
    <button class="btn" onclick="window.open('https://journal.razinsaleh.shop/', '_blank')">
        Enter
    </button>
</div>

</body>
</html>
